<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo Coffee（エストードコーヒー）| 松戸の自家焙煎豆販売</title>
    <meta name="description" content="千葉県松戸市から厳選されたコーヒー豆を丁寧に自家焙煎してお届けします。Estudo Coffeeで、あなただけの特別な一杯を見つけませんか？">
    <meta name="keywords" content="自家焙煎,豆販売,松戸,コーヒー,通販,オンラインショップ,Estudo Coffee">
    
    <style>
        /* 全体のデザイン設定 */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            text-align: center; 
            padding: 50px 20px; 
            background-color: #f8f5f2; 
            color: #3e2723; 
            margin: 0;
        }
        
        /* ロゴ画像の設定 */
        img { 
            max-width: 200px; 
            height: auto;
            margin-bottom: 20px; 
            border-radius: 10px; 
        }
        
        /* 見出しのデザイン */
        h1 { 
            font-size: 2.2em; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }
        
        /* 文章のデザイン */
        p { 
            font-size: 1.1em; 
            line-height: 1.8; 
            margin-bottom: 30px; 
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* ボタン共通のデザイン */
        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover { 
            transform: scale(1.05); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* LINEボタン（緑） */
        .line-btn {
            background-color: #06C755;
            color: white !important;
        }

        /* インスタボタン（グラデーション） */
        .insta-btn {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white !important;
        }

        /* 画面が小さい時（スマホ）の調整 */
        @media (max-width: 480px) {
            h1 { font-size: 1.8em; }
            p { font-size: 1em; }
            .btn { width: 80%; }
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Estudo Coffee ロゴ">

    <h1>Estudo Coffee</h1>

    <p>
        こだわりの豆、至福の一杯をあなたに。<br>
        千葉県松戸市より、一粒一粒丁寧に焙煎した<br>
        新鮮なコーヒー豆をお届けします。<br><br>
        ただいまオンラインショップ準備中です。
    </p>
    
    <a href="https://lin.ee/H9qfA09" class="btn line-btn" target="_blank">
        LINEで友だち追加
    </a>

    <a href="https://www.instagram.com/estudo_coffee_matsudo/" class="btn insta-btn" target="_blank">
        Instagramを見る
    </a>

</body>
</html>
